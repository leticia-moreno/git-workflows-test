name: PR Validation & Auto-approval

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run: corepack enable && corepack prepare

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Check for key file changes
        id: keyfiles
        uses: dorny/paths-filter@v3
        with:
          filters: |
            critical:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*'
              - '*.config.*'
              - 'pages/Home.js'
              - '.github/workflows/**'

      - name: Determine if human review is needed
        id: review_needed
        run: |
          if [[ "${{ github.event.action }}" == "reopened" ]]; then
            echo "reason=reopened" >> $GITHUB_OUTPUT
          elif [[ "${{ steps.keyfiles.outputs.critical }}" == "true" ]]; then
            echo "reason=key_files_changed" >> $GITHUB_OUTPUT
          else
            echo "reason=none" >> $GITHUB_OUTPUT
          fi

      - name: Auto-approve PR (no key files, not reopened)
        if: steps.review_needed.outputs.reason == 'none'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prId = context.payload.pull_request.node_id;
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: '✅ All checks passed and no critical files changed. Auto-approved by Workflow.'
            });
            const query = `mutation($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
              enablePullRequestAutoMerge(input: {
                pullRequestId: $pullRequestId,
                mergeMethod: $mergeMethod
              }) {
                pullRequest {
                  autoMergeRequest {
                    enabledAt
                    enabledBy { login }
                  }
                }
              }
            }`;

            const variables = {
              pullRequestId: prId,
              mergeMethod: 'MERGE'
            };

            await github.graphql(query, variables);

      - name: Request human review (key files changed or reopened)
        if: steps.review_needed.outputs.reason != 'none'
        uses: actions/github-script@v7
        with:
          script: |
            const reason = '${{ steps.review_needed.outputs.reason }}';
            let body = '⛔ Manual review required.';
            if (reason === 'reopened') body += ' This PR was reopened, requiring human validation.';
            if (reason === 'key_files_changed') body += ' Critical files (e.g. package.json, configs) were modified.';

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'REQUEST_CHANGES',
              body: body
            });
